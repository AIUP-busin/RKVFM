<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI UP | Smart Day Platform</title>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --card-bg: #141b2d;
            --neon-blue: #00f0ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --text-color: #ffffff;
            --text-muted: #8a99ad;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header va Brending */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header h1 span {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        header p {
            color: var(--text-muted);
            margin-top: 5px;
            font-size: 1rem;
        }

        /* Analitika Paneli (Dashboard) */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-card h3 {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--neon-blue);
        }

        /* Yangi Vazifa Qo'shish */
        .add-task-form {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            border: 1px solid rgba(0, 240, 255, 0.1);
        }

        input, select, button {
            background: #1f293d;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 5px var(--neon-blue);
        }

        button.add-btn {
            background: var(--neon-blue);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        button.add-btn:hover {
            box-shadow: 0 0 15px var(--neon-blue);
            transform: scale(1.02);
        }

        /* Vazifalar Ro'yxati */
        .task-list {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .task-list h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            border-left: 4px solid var(--neon-blue);
            padding-left: 10px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #1a2235;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid var(--text-muted);
            transition: 0.3s;
        }

        .task-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .task-title {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .task-time {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-check {
            background: rgba(57, 255, 20, 0.1);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
        }

        .btn-check:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 10px var(--neon-green);
        }

        .btn-fail {
            background: rgba(255, 49, 49, 0.1);
            color: var(--neon-red);
            border: 1px solid var(--neon-red);
        }

        .btn-fail:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 10px var(--neon-red);
        }

        /* Status Stillari */
        .task-item.done {
            border-left-color: var(--neon-green);
            opacity: 0.6;
        }
        .task-item.done .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-item.failed {
            border-left-color: var(--neon-red);
            opacity: 0.6;
        }
        .task-item.failed .task-title {
            color: var(--neon-red);
        }

        @media (max-width: 600px) {
            .add-task-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI UP <span>Smart Day</span></h1>
        <p>Vaqtingiz auditi va samaradorlikni nazorat qilish paneli</p>
    </header>

    <div class="dashboard">
        <div class="stat-card">
            <h3>Jami Reja</h3>
            <div class="value" id="total-hours">0 soat</div>
        </div>
        <div class="stat-card">
            <h3>Bajarildi (✅)</h3>
            <div class="value" id="done-hours" style="color: var(--neon-green);">0 soat</div>
        </div>
        <div class="stat-card">
            <h3>Bajarilmadi (❌)</h3>
            <div class="value" id="failed-hours" style="color: var(--neon-red);">0 soat</div>
        </div>
    </div>

    <div class="add-task-form">
        <input type="text" id="task-name" placeholder="Bugun nima ish qilasiz? (Masalan: Kod yozish)">
        <input type="number" id="task-duration" placeholder="Kutilayotgan soat (Masalan: 2)" min="0.5" step="0.5">
        <button class="add-btn" onclick="addTask()">Qo'shish</button>
    </div>

    <div class="task-list">
        <h2>Bugungi vazifalar tartibi</h2>
        <div id="tasks-container">
            </div>
    </div>
</div>

<script>
    // Vazifalarni saqlash uchun massiv
    let tasks = [];

    // Yangi vazifa qo'shish funksiyasi
    function addTask() {
        const nameInput = document.getElementById('task-name');
        const durationInput = document.getElementById('task-duration');

        if (nameInput.value.trim() === '' || durationInput.value === '') {
            alert('Iltimos, vazifa nomi va soatini kiriting!');
            return;
        }

        const task = {
            id: Date.now(),
            name: nameInput.value,
            duration: parseFloat(durationInput.value),
            status: 'pending' // pending, done, failed
        };

        tasks.push(task);
        nameInput.value = '';
        durationInput.value = '';

        renderTasks();
    }

    // Vazifani muvaffaqiyatli deb belgilash (Pitichka)
    function setDone(id) {
        tasks = tasks.map(task => {
            if (task.id === id) task.status = 'done';
            return task;
        });
        renderTasks();
    }

    // Vazifani bajarilmadi deb belgilash (X)
    function setFailed(id) {
        tasks = tasks.map(task => {
            if (task.id === id) task.status = 'failed';
            return task;
        });
        renderTasks();
    }

    // Dashboardni yangilash va hisoblash funksiyasi
    function updateDashboard() {
        let total = 0;
        let done = 0;
        let failed = 0;

        tasks.forEach(task => {
            total += task.duration;
            if (task.status === 'done') done += task.duration;
            if (task.status === 'failed') failed += task.duration;
        });

        document.getElementById('total-hours').innerText = total + " soat";
        document.getElementById('done-hours').innerText = done + " soat";
        document.getElementById('failed-hours').innerText = failed + " soat";
    }

    // Vazifalarni ekranga chizish (Render)
    function renderTasks() {
        const container = document.getElementById('tasks-container');
        container.innerHTML = '';

        if (tasks.length === 0) {
            container.innerHTML = `<p style="color: var(--text-muted); text-align: center; padding: 20px;">Hozircha vazifalar qo'shilmadi.</p>`;
            updateDashboard();
            return;
        }

        tasks.forEach(task => {
            const taskItem = document.createElement('div');
            taskItem.classList.add('task-item');
            if (task.status === 'done') taskItem.classList.add('done');
            if (task.status === 'failed') taskItem.classList.add('failed');

            taskItem.innerHTML = `
                <div class="task-info">
                    <div class="task-title">${task.name}</div>
                    <div class="task-time">⏱ Rejalashtirilgan vaqt: ${task.duration} soat</div>
                </div>
                <div class="task-actions">
                    ${task.status === 'pending' ? `
                        <button class="action-btn btn-check" onclick="setDone(${task.id})">✓</button>
                        <button class="action-btn btn-fail" onclick="setFailed(${task.id})">✕</button>
                    ` : `
                        <span style="font-size: 0.9rem; font-weight: bold; color: ${task.status === 'done' ? 'var(--neon-green)' : 'var(--neon-red)'}">
                            ${task.status === 'done' ? 'BAJARILDI' : 'YAKUNLANMADI'}
                        </span>
                    `}
                </div>
            `;
            container.appendChild(taskItem);
        });

        updateDashboard();
    }

    // Ilk yuklangandagi holat
    renderTasks();
</script>

</body>
</html>
