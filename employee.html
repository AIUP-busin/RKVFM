<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishchi Kirishi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-50 to-blue-50 min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
    
    <a href="Ottimo_SIMPLE.html" style="text-decoration: none; color: #888; font-size: 14px;">← Orqaga</a>
    
    <h1 style="font-size: 28px; font-weight: bold; color: #2563eb; margin: 20px 0 10px 0;">👤 Ishchi Kirishi</h1>
    <p style="color: #888; margin-bottom: 30px;">Username va Parol bilan</p>

    <input type="text" id="username" placeholder="Username" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 14px; box-sizing: border-box;">
    
    <input type="password" id="password" placeholder="Parol" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; font-size: 14px; box-sizing: border-box;">

    <button onclick="employeeLogin()" style="width: 100%; padding: 14px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;">
        Kirish
    </button>

    <div id="message" style="margin-top: 20px; padding: 12px; border-radius: 8px; text-align: center; display: none; font-size: 14px;"></div>

</div>

<script>
function employeeLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const msg = document.getElementById('message');
    
    if (!username || !password) {
        msg.textContent = '❌ Barcha maydonlarni to\'ldiring!';
        msg.style.background = '#fee2e2';
        msg.style.color = '#991b1b';
        msg.style.display = 'block';
        return;
    }
    
    // Tekshirish (Demo uchun)
    const validUsers = {
        'ilhom_1': 'Pass123456',
        'ibrohim_2': 'Pass234567',
        'muhamad_3': 'Pass345678'
    };
    
    if (validUsers[username] !== password) {
        msg.textContent = '❌ Username yoki parol noto\'g\'ri!';
        msg.style.background = '#fee2e2';
        msg.style.color = '#991b1b';
        msg.style.display = 'block';
        return;
    }
    
    localStorage.setItem('user', JSON.stringify({username, role: 'employee'}));
    alert('✅ Kirish muvaffaqiyatli!');
    window.location.href = 'empDashboard.html';
}
</script>

</body>
</html>
