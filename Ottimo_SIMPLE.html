<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ottimo Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body class="bg-gradient-to-br from-green-50 to-blue-50 min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-3xl shadow-2xl p-16 w-full max-w-3xl">
    
    <!-- LOGO -->
    <div class="text-center mb-16">
        <h1 style="font-size: 48px; font-weight: 900; color: #047857; margin: 0;">OTTIMO PRO</h1>
        <p style="color: #888; font-size: 18px; margin: 10px 0 0 0;">Xodim Boshqarish Tizimi</p>
    </div>

    <!-- 3 TA TUGMA -->
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">

        <!-- 1. RAHBAR KIRISHI -->
        <a href="manager.html" style="text-decoration: none;">
            <div style="background: linear-gradient(135deg, #10b981, #059669); color: white; border-radius: 20px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.1);" 
                 onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 15px 35px rgba(0,0,0,0.2)';"
                 onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 10px 25px rgba(0,0,0,0.1)';">
                <div style="font-size: 50px; margin-bottom: 15px;">👨‍💼</div>
                <h2 style="font-size: 22px; font-weight: bold; margin: 0 0 10px 0;">Rahbar Kirishi</h2>
                <p style="font-size: 13px; color: rgba(255,255,255,0.9); margin: 0;">Parol bilan</p>
            </div>
        </a>

        <!-- 2. ISHCHI KIRISHI -->
        <a href="employee.html" style="text-decoration: none;">
            <div style="background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; border-radius: 20px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.1);"
                 onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 15px 35px rgba(0,0,0,0.2)';"
                 onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 10px 25px rgba(0,0,0,0.1)';">
                <div style="font-size: 50px; margin-bottom: 15px;">👤</div>
                <h2 style="font-size: 22px; font-weight: bold; margin: 0 0 10px 0;">Ishchi Kirishi</h2>
                <p style="font-size: 13px; color: rgba(255,255,255,0.9); margin: 0;">Username + Password</p>
            </div>
        </a>

        <!-- 3. YANGI ISHCHI -->
        <a href="register.html" style="text-decoration: none;">
            <div style="background: linear-gradient(135deg, #f97316, #c2410c); color: white; border-radius: 20px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.1);"
                 onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 15px 35px rgba(0,0,0,0.2)';"
                 onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 10px 25px rgba(0,0,0,0.1)';">
                <div style="font-size: 50px; margin-bottom: 15px;">➕</div>
                <h2 style="font-size: 22px; font-weight: bold; margin: 0 0 10px 0;">Yangi Ishchi</h2>
                <p style="font-size: 13px; color: rgba(255,255,255,0.9); margin: 0;">Ro'yxatdan o'tish</p>
            </div>
        </a>

    </div>

    <p style="text-align: center; color: #999; font-size: 13px; margin-top: 20px;">Tanlang va kiriting →</p>

</div>

</body>
</html>
