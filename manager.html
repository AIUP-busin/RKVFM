<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahbar Kirishi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-50 to-blue-50 min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
    
    <a href="Ottimo_SIMPLE.html" style="text-decoration: none; color: #888; font-size: 14px;">← Orqaga</a>
    
    <h1 style="font-size: 28px; font-weight: bold; color: #047857; margin: 20px 0 10px 0;">👨‍💼 Rahbar Kirishi</h1>
    <p style="color: #888; margin-bottom: 30px;">Parol bilan kiriting</p>

    <input type="text" placeholder="Ism-Familya" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 14px; box-sizing: border-box;">
    
    <input type="password" placeholder="Parol" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-size: 14px; box-sizing: border-box;">
    
    <p style="font-size: 12px; color: #888; margin-bottom: 20px;">🔑 Parol: <strong>aiupottimo</strong></p>

    <button onclick="login()" style="width: 100%; padding: 14px; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;">
        Kirish
    </button>

    <div id="message" style="margin-top: 20px; padding: 12px; border-radius: 8px; text-align: center; display: none; font-size: 14px;"></div>

</div>

<script>
function login() {
    const name = document.querySelector('input[type="text"]').value;
    const password = document.querySelector('input[type="password"]').value;
    const msg = document.getElementById('message');
    
    if (!name || !password) {
        msg.textContent = '❌ Barcha maydonlarni to\'ldiring!';
        msg.style.background = '#fee2e2';
        msg.style.color = '#991b1b';
        msg.style.display = 'block';
        return;
    }
    
    if (password !== 'aiupottimo') {
        msg.textContent = '❌ Parol noto\'g\'ri!';
        msg.style.background = '#fee2e2';
        msg.style.color = '#991b1b';
        msg.style.display = 'block';
        return;
    }
    
    localStorage.setItem('user', JSON.stringify({name, role: 'manager'}));
    alert('✅ Kirish muvaffaqiyatli!');
    window.location.href = 'dashboard.html';
}
</script>

</body>
</html>
